version: '3.8'

services:
  backend:
    image: ricardops34/sistema-backend:latest
    container_name: sistema-backend-prod
    restart: always
    environment:
      # Host 'postgres_postgres' detectado na rede 'network_db' da VPS
      DATABASE_URL: postgresql://sistema:Sistema%231245@postgres_postgres:5432/sistema?schema=public
      PORT: 3000
    networks:
      - network_db
      - network_public

  frontend:
    image: ricardops34/sistema-frontend:latest
    container_name: sistema-frontend-prod
    restart: always
    networks:
      - network_public
    labels:
      - "traefik.enable=true"
      # URL DEFINIDA: sistema.bjsoft.com.br
      - "traefik.http.routers.sistema-fb.rule=Host(`sistema.bjsoft.com.br`)"
      - "traefik.http.routers.sistema-fb.entrypoints=websecure"
      - "traefik.http.routers.sistema-fb.tls.certresolver=letsencryptresolver" # Resolver detectado na VPS
      - "traefik.http.services.sistema-fb.loadbalancer.server.port=80"

networks:
  network_public:
    external: true
  network_db:
    external: true
