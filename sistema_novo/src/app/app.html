<div class="po-wrapper">
  <po-toolbar p-title="Sistema de Gestão" 
              *ngIf="!isLoginPage" 
              [p-profile]="profile"
              [p-profile-actions]="profileActions">
  </po-toolbar>

  <po-menu [p-menus]="filteredMenus" 
           *ngIf="!isLoginPage" 
           p-logo="/logo.png" 
           [p-filter]="true">
  </po-menu>

  <div class="po-main-container">
    <router-outlet></router-outlet>
  </div>
</div>
